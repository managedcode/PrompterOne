name: Sync Vendored Streaming SDKs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Sync pinned vendored SDKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/vendored_streaming_sdks.py sync

      - name: Verify vendored SDK layout
        run: python scripts/vendored_streaming_sdks.py verify

      - name: Upload vendored SDK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vendored-streaming-sdks
          path: |
            vendored-streaming-sdks.json
            src/PrompterOne.Shared/wwwroot/vendor/livekit-client/
            src/PrompterOne.Shared/wwwroot/vendor/vdo.ninja/
