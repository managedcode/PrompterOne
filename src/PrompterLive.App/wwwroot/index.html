<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompter.live</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="_content/PrompterLive.Shared/favicon.png" />
    <script src="_content/PrompterLive.Shared/theme/browser-theme.js"></script>
    <link rel="stylesheet" href="_content/PrompterLive.Shared/design/tokens.css" />
    <link rel="stylesheet" href="_content/PrompterLive.Shared/design/components.css" />
    <link rel="stylesheet" href="_content/PrompterLive.Shared/design/styles.css" />
    <link rel="stylesheet" href="_content/PrompterLive.Shared/app.css" />
    <link rel="stylesheet" href="PrompterLive.App.styles.css" />
</head>
<body>
    <div id="app">
        <div class="app-loading-shell">
            <div class="app-loading-mark"></div>
            <p>Loading Prompter.live...</p>
        </div>
    </div>

    <div id="blazor-error-ui" class="app-shell-overlay app-shell-overlay-error" role="alertdialog" aria-modal="true" data-nosnippet data-testid="diagnostics-bootstrap">
        <div class="app-shell-card app-shell-card-error">
            <span class="app-shell-eyebrow" id="app-shell-error-eyebrow">Diagnostics</span>
            <h2 id="app-shell-error-title">Prompter.live hit a shell error</h2>
            <p id="app-shell-error-message">The app shell could not recover automatically. Reload the app to restore editing, reading, and live tools.</p>
            <div id="app-shell-error-detail" class="app-shell-detail" hidden></div>
            <div class="app-shell-actions">
                <a href="." class="app-shell-btn app-shell-btn-primary reload" data-testid="diagnostics-bootstrap-reload">Reload App</a>
                <button type="button" class="app-shell-btn dismiss" data-testid="diagnostics-bootstrap-dismiss">Dismiss</button>
            </div>
        </div>
    </div>

    <script src="_content/PrompterLive.Shared/media/browser-media.js"></script>
    <script src="_content/PrompterLive.Shared/media/go-live-media-compositor.js"></script>
    <script src="_content/PrompterLive.Shared/media/go-live-output-support.js"></script>
    <script src="_content/PrompterLive.Shared/vendor/livekit-client/v2.18.0/livekit-client.umd.js"></script>
    <script src="_content/PrompterLive.Shared/media/go-live-output.js"></script>
    <script src="_content/PrompterLive.Shared/editor/editor-source-panel.js"></script>
    <script src="_content/PrompterLive.Shared/learn/learn-rsvp-layout.js"></script>
    <script src="_content/PrompterLive.Shared/teleprompter/teleprompter-reader.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        const wasmDebugQueryKey = "wasm-debug";
        const wasmDebugDisabledLevel = 0;
        const wasmDebugEnabledLevel = 1;
        const currentUrl = new URL(window.location.href);
        const isWasmDebugEnabled = currentUrl.searchParams.get(wasmDebugQueryKey) === "1";

        Blazor.start({
            configureRuntime: function (builder) {
                builder.withDebugging(isWasmDebugEnabled ? wasmDebugEnabledLevel : wasmDebugDisabledLevel);
            }
        });
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q2SNBFT7MM"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-Q2SNBFT7MM');
    </script>
</body>
</html>
